services:
  - type: web
    name: JobNest-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      # 🔐 JWT
      - key: JWT_SECRET
        sync: false

      # ☁️ Cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # 🗄️ Database
      - key: CONNECTION_STRING
        sync: false